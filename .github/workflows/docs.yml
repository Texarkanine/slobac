name: Build and Deploy Docs Site

on:
  push:
    branches:
      - main
  pull_request:
    # Build on all PRs so link-validation / strict-mode gates docs changes at review time.
    # Deploy job is skipped for PRs (see the `if:` on `deploy:` below).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy to Pages; do not cancel in-progress prod deploys, but skip
# any runs queued between the in-progress one and the latest queued one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site (strict)
        # properdocs is a drop-in for mkdocs build; config file stays mkdocs.yml.
        run: properdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # PR builds stop at the `build` job — they gate link validity without deploying.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
